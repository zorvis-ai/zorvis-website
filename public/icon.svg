<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background: rounded square, indigo -->
  <rect width="32" height="32" rx="7" fill="#4F46E5"/>

  <!-- Z mark — three strokes matching brand exactly -->
  <!-- Top bar (Hire) -->
  <line x1="8" y1="9" x2="24" y2="9" stroke="white" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Diagonal (Manage) -->
  <line x1="24" y1="9" x2="8" y2="23" stroke="#C7D2FE" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Bottom bar (Grow) -->
  <line x1="8" y1="23" x2="24" y2="23" stroke="white" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Intelligence dots — TR and BL junctions -->
  <circle cx="24" cy="9" r="2.2" fill="#4F46E5"/>
  <circle cx="24" cy="9" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="8" cy="23" r="2.2" fill="#4F46E5"/>
  <circle cx="8" cy="23" r="1.5" fill="white" opacity="0.9"/>
</svg>
